<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML5 Speed Hack -- free</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="header">
   Speed Hack
</div>

<div class="container">

    <div id="permission-warning" style="display: none; background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 12px; border-radius: 4px; margin-bottom: 15px; text-align: center;">
        <p style="margin: 0 0 8px 0; font-size: 13px;">Extension lacks permission to run on this page.</p>
        <button id="request-permission-btn" style="background: #d32f2f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Grant Permission</button>
    </div>

    <h2>HTML5 Universal Speed Hack -- free</h2>

    <div class="slider-container">
        <div style="display: flex; justify-content: center; margin-bottom: 10px;">
            <input id="speed-number" type="number" min="0.25" step="0.25" value="10" style="width: 80px; text-align: center; padding: 4px; font-size: 16px;">
            <span style="align-self: center; margin-left: 5px; font-weight: bold;">x</span>
        </div>
        <input id="speed" type="range" min="0.25" max="100" value="10" step="0.25">
        <div class="labels">
            <span>0.25x</span>
            <span>25x</span>
            <span>50x</span>
            <span>75x</span>
            <span>100x</span>
        </div>
    </div>

    <div class="option">
        <label class="switch">
            <input type="checkbox" id="interval">
            <span class="slider"></span>
        </label>
        <span>setInterval</span>
    </div>
    <div class="option">
        <label class="switch">
            <input type="checkbox" id="timeout">
            <span class="slider"></span>
        </label>
        <span>setTimeout</span>
    </div>
    <div class="option">
        <label class="switch">
            <input type="checkbox" id="performance">
            <span class="slider"></span>
        </label>
        <span>performance.now</span>
    </div>
    <div class="option">
        <label class="switch">
            <input type="checkbox" id="date">
            <span class="slider"></span>
        </label>
        <span>Date.now</span>
    </div>
    <div class="option">
        <label class="switch">
            <input type="checkbox" id="raf">
            <span class="slider"></span>
        </label>
        <span>requestAnimationFrame</span>
    </div>
    <h4>Free version by <a target="_blank" href="https://github.com/RNGDelak">@RNGDelak</a>. Hope you enjoy!!!</h4>
</div>

<script src="popup.js"></script>
</body>
</html>
